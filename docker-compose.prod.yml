services:
  housewarming_backend:
    build:
      context: ./housewarming_backend
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --access-logfile -"
    env_file:
      - ./housewarming_backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./housewarming_backend/data:/app/data
